name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Fail only on real errors (syntax errors, undefined names) —
          # ignore style nitpicks so this doesn't get noisy
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check backend imports cleanly
        env:
          DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/ci_db
          JWT_SECRET: this_is_a_dummy_ci_secret_not_used_in_production_00000000
        run: python -c "import app.main"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
